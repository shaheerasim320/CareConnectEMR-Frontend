<div class="container-xxl vh-100 p-0">
    <div class="row g-0 vh-100">
        <div class="col-lg-7 d-none d-lg-block illustration-section">
            <div class="ellipse-1"></div>
            <div class="ellipse-2">
                <img src="assets/images/bg 1.svg" alt="background-image" class="hospital-bg">
                <div class="content-overlay">
                    <h1 class="title">CareConnect EMR</h1>
                </div>
            </div>
            <img src="assets/images/login-doctor.svg" alt="background-image" class="doctor-img">
        </div>

        <div class="col-12 col-lg-5 d-flex align-items-center justify-content-center right-panel">
            <div class="p-4 w-100 border rounded-3 login-box">
                <div class="logo text-center">
                    <img src="assets/images/logo.png" alt="logo" width="220px">
                </div>

                <h2 class="mb-0 text-center fs-4">Welcome back</h2>
                <p class="mb-4 text-muted text-center welcome-para">Please enter your details to sign in</p>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-2">

                    <label for="identifier" class="fw-bold label">Username or Email</label>
                    <input type="text" id="identifier" class="form-control mb-2" placeholder="username/email"
                        formControlName="identifier"
                        [class.border-danger]="loginForm.get('identifier')?.touched && loginForm.get('identifier')?.invalid">

                    <label for="password" class="fw-bold label">Password</label>
                    <div class="input-group mb-2">
                        <input [type]="hidePassword ? 'password' : 'text'" class="form-control border-end-0" id="password" placeholder="password" formControlName="password" [class.border-danger]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                        <span class="input-group-text p-cursor" (click)="hidePassword = !hidePassword">
                            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                        </span>
                    </div>

                    <div class="d-flex align-items-center mb-3">
                        <div class="form-check custom-checkbox">
                            <input class="form-check-input" type="checkbox" id="remember" formControlName="rememberMe">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-login w-100" [disabled]="loading||loginForm.invalid">
                        @if(loading){
                        <span class="spinner-border spinner-border-sm me-2"></span>
                        } @else {
                        <i class="bi bi-box-arrow-in-right me-2"></i> Login
                        }
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
