<div class="container-xxl vh-100 p-0">
    <div class="row g-0 vh-100">
        <div class="col-lg-7 d-none d-lg-block illustration-section">
            <div class="ellipse-1"></div>
            <div class="ellipse-2">
                <img src="assets/images/bg 1.svg" alt="background-image" class="hospital-bg">
                <div class="content-overlay">
                    <h1 class="title">CareConnect EMR</h1>
                </div>
            </div>
            <img src="assets/images/login-doctor.svg" alt="background-image" class="doctor-img">
        </div>

        <div class="col-12 col-lg-5 d-flex align-items-center justify-content-center right-panel">
            <div class="p-4 w-100" style="max-width: 450px;">
                <div class="logo text-center">
                    <img src="assets/images/logo.png" alt="logo" width="220px">
                </div>

                <h2 class="mb-1 text-center">Welcome back</h2>
                <p class="mb-4 text-muted text-center">Please enter your details to sign in</p>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-2">
                    <div class="input-group mb-3 custom-input-group" [class.border-danger]="loginForm.get('identifier')?.touched && loginForm.get('identifier')?.invalid">
                        <span class="input-group-text bg-transparent border-end-0">
                            <mat-icon matPrefix>person</mat-icon>
                        </span>
                        <input type="text" class="form-control border-start-0" placeholder="username/email"
                            formControlName="identifier">
                    </div>

                    <div class="input-group mb-3 custom-input-group" [class.border-danger]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                        <span class="input-group-text">
                            <mat-icon matPrefix>lock</mat-icon>
                        </span>
                        <input [type]="hidePassword ? 'password' : 'text'" class="form-control" placeholder="password"
                            formControlName="password">
                        <span class="input-group-text p-cursor" (click)="hidePassword = !hidePassword">
                            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                        </span>
                    </div>

                    <div class="d-flex align-items-center mb-3">
                        <div class="form-check custom-checkbox">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-login w-100" [disabled]="loading||loginForm.invalid">
                        @if(loading){
                        <span class="spinner-border spinner-border-sm me-2"></span>
                        } @else {
                        <i class="bi bi-box-arrow-in-right me-2"></i> Login
                        }
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
