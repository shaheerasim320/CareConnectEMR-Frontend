<div class="widget-card shadow-sm skeleton-wrapper">
  <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
    <div class="d-flex gap-2 align-items-center">
      <div class="skeleton shimmer icon-placeholder"></div>
      <div class="skeleton shimmer header-title"></div>
    </div>
    <div class="skeleton shimmer btn-placeholder"></div>
  </div>

  <div class="table-container d-none d-md-block">
    <div class="table-skeleton-header">
      <div class="skeleton shimmer label"></div>
      <div class="skeleton shimmer label"></div>
      <div class="skeleton shimmer label"></div>
    </div>
    
    @for (i of [1, 2, 3, 4, 5]; track i) {
      <div class="table-skeleton-row">
        <div class="d-flex align-items-center">
          <div class="skeleton shimmer avatar"></div>
          <div class="ms-3 flex-grow-1">
            <div class="skeleton shimmer text-line w-75 mb-2"></div>
            <div class="skeleton shimmer text-line w-50"></div>
          </div>
        </div>
        <div class="d-flex align-items-center">
          <div class="skeleton shimmer text-line w-75"></div>
        </div>
        <div class="d-flex align-items-center">
          <div class="skeleton shimmer badge-placeholder"></div>
        </div>
      </div>
    }
  </div>

  <div class="mobile-cards-container d-md-none p-3">
    @for (i of [1, 2, 3]; track i) {
      <div class="appointment-mobile-skeleton mb-3 p-3">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div class="d-flex align-items-center">
            <div class="skeleton shimmer avatar"></div>
            <div class="ms-3">
              <div class="skeleton shimmer text-line mb-2" style="width: 100px;"></div>
              <div class="skeleton shimmer text-line" style="width: 60px;"></div>
            </div>
          </div>
          <div class="skeleton shimmer badge-placeholder"></div>
        </div>
        <div class="pt-2 border-top d-flex justify-content-between">
          <div class="skeleton shimmer text-line" style="width: 80px;"></div>
          <div class="skeleton shimmer text-line" style="width: 40px;"></div>
        </div>
      </div>
    }
  </div>
</div>
