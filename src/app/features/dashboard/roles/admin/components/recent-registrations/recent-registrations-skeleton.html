<div class="widget-card skeleton-wrapper">
  <div class="card-header d-flex align-items-center justify-content-between">
    <div class="skeleton pulse header-title"></div>
    <div class="d-flex gap-2">
      <div class="skeleton pulse btn-placeholder"></div>
      <div class="skeleton pulse btn-placeholder"></div>
    </div>
  </div>

  <div class="d-none d-md-block px-3">
    <div class="table-skeleton-row header-row">
      <div class="skeleton pulse cell"></div>
      <div class="skeleton pulse cell"></div>
      <div class="skeleton pulse cell"></div>
      <div class="skeleton pulse cell"></div>
    </div>
    @for (i of [1,2,3,4,5]; track i) {
      <div class="table-skeleton-row">
        <div class="d-flex align-items-center gap-2 cell">
          <div class="skeleton pulse avatar"></div>
          <div class="skeleton pulse text-line w-75"></div>
        </div>
        <div class="skeleton pulse text-line cell"></div>
        <div class="skeleton pulse text-line cell"></div>
        <div class="skeleton pulse text-line cell"></div>
      </div>
    }
  </div>

  <div class="d-block d-md-none px-2 pt-2">
    @for (i of [1,2,3]; track i) {
      <div class="card mb-2 border-0 shadow-sm p-3">
        <div class="d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-3">
            <div class="skeleton pulse avatar"></div>
            <div>
              <div class="skeleton pulse text-line mb-2" style="width: 100px;"></div>
              <div class="skeleton pulse text-line" style="width: 60px;"></div>
            </div>
          </div>
          <div class="skeleton pulse text-line" style="width: 40px;"></div>
        </div>
      </div>
    }
  </div>
</div>
